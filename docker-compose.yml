name: soa-clean-microservices

x-backend-env: &backend-env
  NODE_ENV: production
  CORS_ORIGIN: http://localhost:3000
  KAFKA_BROKERS: kafka:29092
  LOG_LEVEL: info

x-app: &app
  build:
    context: .
    target: runner
  image: soa-clean-microservices/app:latest
  restart: unless-stopped
  init: true
  stop_grace_period: 20s

x-health: &health
  interval: 15s
  timeout: 5s
  retries: 10
  start_period: 20s

services:
  kafka:
    image: apache/kafka:4.2.0
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: INTERNAL://:29092,PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:29092 --list >/dev/null 2>&1"]
      <<: *health
      start_period: 30s

  model-service:
    <<: *app
    command: ["node", "backend/services/model-service/dist/index.js"]
    environment:
      <<: *backend-env
      MODEL_GRPC_PORT: 5103
      MODEL_HEALTH_PORT: 4103
      MODEL_DB_PATH: /data/model.sqlite
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "4103:4103"
      - "5103:5103"
    volumes:
      - model-data:/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4103').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      <<: *health

  chat-service:
    <<: *app
    command: ["node", "backend/services/chat-service/dist/index.js"]
    environment:
      <<: *backend-env
      CHAT_GRPC_PORT: 5102
      CHAT_HEALTH_PORT: 4102
      CHAT_DB_PATH: /data/chat.sqlite
      MODEL_GRPC_URL: model-service:5103
    depends_on:
      kafka:
        condition: service_healthy
      model-service:
        condition: service_healthy
    ports:
      - "4102:4102"
      - "5102:5102"
    volumes:
      - chat-data:/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4102').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      <<: *health

  activity-service:
    <<: *app
    command: ["node", "backend/services/activity-service/dist/index.js"]
    environment:
      <<: *backend-env
      ACTIVITY_GRPC_PORT: 5104
      ACTIVITY_HEALTH_PORT: 4104
      ACTIVITY_DB_PATH: /data/activity.sqlite
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "4104:4104"
      - "5104:5104"
    volumes:
      - activity-data:/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4104').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      <<: *health

  api-gateway:
    <<: *app
    command: ["node", "backend/gateway/dist/index.js"]
    environment:
      <<: *backend-env
      API_GATEWAY_PORT: 8080
      CHAT_GRPC_URL: chat-service:5102
      MODEL_GRPC_URL: model-service:5103
      ACTIVITY_GRPC_URL: activity-service:5104
    depends_on:
      chat-service:
        condition: service_healthy
      model-service:
        condition: service_healthy
      activity-service:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      <<: *health

  web:
    <<: *app
    command: ["node", "frontend/web/.next/standalone/frontend/web/server.js"]
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      <<: *health

volumes:
  kafka-data:
  chat-data:
  model-data:
  activity-data:
